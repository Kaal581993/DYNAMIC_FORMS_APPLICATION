server:
  port: 8086

spring:
  application:
    name: submission-service

  config:
    import: optional:configserver:http://localhost:8888
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jpa.HibernateJpaAutoConfiguration




  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/dynamic_form_db?authSource=admin
      database: dynamic_form_db
      auto-index-creation: true



  # Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    registry-fetch-interval-seconds: 10
    instance-info-replication-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
      form-service:
        connectTimeout: 10000
        readTimeout: 10000
  circuitbreaker:
    enabled: true

# Encryption settings
encryption:
  aes:
    key: your-256-bit-secret-key-here

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.form_builder: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8762
        description: API Gateway (Port 8762)
      - url: http://localhost:8086
        description: Submission Service
    path: /swagger-ui.html
    use-root-path: true
    tagsSorter: alpha
    operationsSorter: alpha
    docExpansion: none
  api-docs:
    path: /v3/api-docs

