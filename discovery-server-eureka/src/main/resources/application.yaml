server:
  port: 8761

spring:
  application:
    name: discovery-server-eureka
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

eureka:
  instance:
    hostname: localhost
  dashboard:
    path: /eureka-dashboard
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  server:
    enableSelfPreservation: false

logging:
  level:
    root: INFO
    com.netflix.discovery: INFO

