server:
  port: 8762

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888


  cloud:
    gateway:
      routes:
        # Auth Server - OAuth2 & Authentication
        - id: auth-server
          uri: lb://AUTH-SERVER
          predicates:
            - Path=/oauth2/**,/login/**
          filters:
            - StripPrefix=0

        # User Service
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**,/users/**
          filters:
            - StripPrefix=1

        # Form Service
        - id: form-service
          uri: lb://FORM-SERVICE
          predicates:
            - Path=/api/forms/**,/forms/**
          filters:
            - StripPrefix=1

        # Submission Service
        - id: submission-service
          uri: lb://SUBMISSION-SERVICE
          predicates:
            - Path=/api/submissions/**,/submissions/**
          filters:
            - StripPrefix=1

        # Role Service
        - id: role-service
          uri: lb://ROLE-SERVICE
          predicates:
            - Path=/api/roles/**,/roles/**
          filters:
            - StripPrefix=1

        # Swagger Docs Routes - Forward to each service
        - id: user-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/user-service-docs/**
          filters:
            - StripPrefix=1

        - id: form-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/form-service-docs/**
          filters:
            - StripPrefix=1

        - id: role-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/role-service-docs/**
          filters:
            - StripPrefix=1

        - id: auth-server-docs
          uri: http://localhost:8085
          predicates:
            - Path=/auth-server-docs/**
          filters:
            - StripPrefix=1

        - id: submission-service-docs
          uri: http://localhost:8086
          predicates:
            - Path=/submission-service-docs/**
          filters:
            - StripPrefix=1

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

  # JWT Configuration for Gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085
          jwk-set-uri: http://localhost:8085/.well-known/jwks.json

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.netflix: INFO


# SpringDoc OpenAPI Configuration
springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8762
        description: API Gateway (Port 8762)
      - url: http://localhost:8081
        description: Form Service
      - url: http://localhost:8082
        description: User Service
      - url: http://localhost:8083
        description: Role Service
      - url: http://localhost:8085
        description: Auth Server
      - url: http://localhost:8086
        description: Submission Service
    path: /swagger-ui.html
    use-root-path: true
    tagsSorter: alpha
    operationsSorter: alpha
    docExpansion: none
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'api-gateway'
      paths-to-match: '/**'
      packages-to-scan: com.form_builder.API_Gateway



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
