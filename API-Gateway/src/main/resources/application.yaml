spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888

# SpringDoc OpenAPI Configuration
springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8762
        description: API Gateway Swagger
    path: /swagger-ui.html
    use-root-path: false
    tagsSorter: alpha
    operationsSorter: alpha
    docExpansion: none
  api-docs:
    path: /v3/api-docs

