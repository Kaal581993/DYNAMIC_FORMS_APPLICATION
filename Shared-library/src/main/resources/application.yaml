server:
  port: 8087

spring:
  application:
    name: shared-library
  config:
    import: optional:configserver:http://localhost:8888

springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8762
        description: Shared Library Swagger
    path: /swagger-ui.html
    use-root-path: false
    tagsSorter: alpha
    operationsSorter: alpha
    docExpansion: none
  api-docs:
    path: /v3/api-docs

