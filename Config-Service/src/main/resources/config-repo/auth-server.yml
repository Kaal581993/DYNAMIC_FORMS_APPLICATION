server:
  port: 8085

spring:
  application:
    name: auth-server

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: PostGres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Security OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: GOOGLE_CLIENT_ID
            client-secret: GOOGLE_CLIENT_SECRET
            scope:
              - openid
              - profile
              - email

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

      # Authorization Server Configuration
      authorizationserver:
        client:
          default:
            client-id: form-builder-client
            client-secret: "{noop}secret"
            redirect-uri: http://localhost:3000/login/oauth2/code/google
            scope:
              - openid
              - profile
              - email
            authorization-grant-types:
              - authorization_code
              - refresh_token
            require-authorization-consent: true

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    registry-fetch-interval-seconds: 10
    instance-info-replication-interval-seconds: 10
  instance:
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10

# JWT Configuration
jwt:
  secret: mySecretKeyForJwtTokenGeneration12345678901234567890
  issuer-uri: http://localhost:8085
  jwk-set-uri: http://localhost:8085/.well-known/jwks.json

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.form_builder: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
