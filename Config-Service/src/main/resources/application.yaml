spring:
  application:
    name: Config-Service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo

server:
  port: 8888


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    org.springframework.boot: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,refresh

springdoc:
  swagger-ui:
    servers:
      - url: http://localhost:8762
        description: Config Service Swagger
    path: /swagger-ui.html
    use-root-path: false
    tagsSorter: alpha
    operationsSorter: alpha
    docExpansion: none
  api-docs:
    path: /v3/api-docs

